name: safepoint_app
description: Application de gestion des hébergements d'urgence – safepointapp.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  # Firebase — complete suite V1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.1.2
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1
  # Security
  flutter_secure_storage: ^9.2.2
  # QR code scanning
  qr_code_scanner: ^1.0.1
  # Référentiel communes INSEE (geo.api.gouv.fr)
  http: ^1.2.2
  # Traducteur fiche personne : reconnaissance vocale
  speech_to_text: ^7.0.0
  # Exports cellule de crise (CSV / PDF)
  pdf: ^3.11.1
  printing: ^5.13.3
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_safepoint.png
